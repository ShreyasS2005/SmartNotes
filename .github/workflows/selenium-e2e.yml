name: E2E Tests (Web & Android Reports)

on:
push:
branches: [main]
pull_request:
branches: [main]

jobs:
selenium-e2e:
name: Selenium E2E Web Tests
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v5
    with:
      node-version: '20'

  - name: Install web dependencies
    working-directory: website
    run: npm install

  - name: Run Selenium E2E tests
    working-directory: website
    run: |
      npm run dev &
      for i in {1..30}; do
        curl -s http://localhost:3000 && break || sleep 2
      done
      HEADLESS=true npm test

  - name: Upload Selenium report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: selenium-test-report
      path: website/reports/selenium-report.xlsx
```

appium-e2e:
name: Upload Existing Appium Reports
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Upload Appium Report
    uses: actions/upload-artifact@v4
    with:
      name: android-appium-report
      path: |
        android_automation/reports/*.xlsx
        android_automation/reports/screenshots/*.png
```
